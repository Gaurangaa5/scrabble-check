<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Word Checker</title>
    <style>
        /* Link local Cairo fonts */
        @font-face {
            font-family: 'Cairo';
            src: url('Cairo-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Cairo';
            src: url('Cairo-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        body { 
            font-family: 'Cairo', Arial, sans-serif; 
            text-align: center; 
            background: #f4f7f6; 
            padding: 40px 20px; 
            color: #333; 
        }
        
        .container { 
            background: white; 
            padding: 35px; 
            border-radius: 12px; 
            max-width: 500px; 
            margin: 0 auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        
        h1 { 
            color: #1a1a1a; 
            margin-bottom: 25px; 
            font-size: 32px; 
            font-weight: bold;
        }
        
        input[type="text"] { 
            font-family: 'Cairo', Arial, sans-serif;
            width: 85%; 
            padding: 12px; 
            font-size: 20px; 
            text-transform: uppercase; 
            border: 2px solid #ccd1d9; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: bold; 
            letter-spacing: 2px; 
        }
        
        input[type="text"]:focus { 
            border-color: #007BFF; 
            outline: none; 
        }
        
        button { 
            font-family: 'Cairo', Arial, sans-serif;
            padding: 12px 25px; 
            font-size: 16px; 
            background: #007BFF; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        
        button:hover { 
            background: #0056b3; 
        }
        
        #result { 
            margin-top: 25px; 
            font-size: 24px; 
            font-weight: bold; 
            min-height: 35px; 
        }
        
        .valid { 
            color: #2e7d32; 
        }
        
        .invalid { 
            color: #c62828; 
        }
        
        #definitionBox { 
            margin-top: 20px; 
            padding: 20px; 
            background: #f8f9fa; 
            border-left: 4px solid #007BFF; 
            border-radius: 4px; 
            text-align: left; 
            font-size: 16px; 
            line-height: 1.6; 
            color: #2d3748; 
            display: none; 
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); 
        }
        
        .def-title { 
            font-weight: bold; 
            color: #1a1a1a; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #ddd; 
            padding-bottom: 4px; 
            font-size: 20px; 
        }
        
        .file-zone { 
            background: #e9ecef; 
            border: 2px dashed #bbb; 
            padding: 25px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
        }
        
        .hidden { 
            display: none; 
        }
        
        .status { 
            font-size: 14px; 
            color: #555; 
            margin-top: 20px; 
            font-weight: bold; 
        }
    
        .footer {
            margin-top: 35px;
            font-size: 14px;
            color: #777;
            text-align: center;
            line-height: 1.6;
            border-top: 1px solid #ddd;
            padding-top: 18px;
        }
        .footer strong { color:#333; }
        .footer .date { font-size:13px;color:#999; }

    </style>
</head>
<body>

<div class="container">
    <h1>Scrabble Checker</h1>
    
    <!-- File Loader -->
    <div id="uploadZone" class="file-zone">
        <p style="margin-top:0; font-weight:bold;">Select your cleaned word list file:</p>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <!-- Word Input Area -->
    <div id="checkerZone" class="hidden">
        <input type="text" id="wordInput" placeholder="ENTER WORD" onkeypress="handleKeyPress(event)">
        <br>
        <button onclick="checkWord()">Check Word</button>
    </div>
    
    <div id="result"></div>
    <div id="definitionBox"></div>
    
    <div id="status" class="status">Waiting for file upload...</div>
</div>

<script>
    const scrabbleDictionary = new Map();

    const letterValues = {
        A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8, K:5, L:1, M:3, 
        N:1, O:1, P:3, Q:10, R:1, S:1, T:1, U:1, V:4, W:4, X:8, Y:4, Z:10
    };

    function calculateScore(word) {
        let score = 0;
        for (let char of word) score += letterValues[char] || 0;
        return score;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusDiv = document.getElementById('status');
        statusDiv.textContent = "Loading words and meanings... Please wait.";
        statusDiv.style.color = "#007BFF";

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            const lines = text.split(/\r?\n/);
            
            scrabbleDictionary.clear();
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const firstSpaceIndex = line.search(/[\s\t]/);
                let word = "";
                let definition = "";

                if (firstSpaceIndex === -1) {
                    word = line.replace(/[^a-zA-Z]/g, "").toUpperCase();
                } else {
                    word = line.substring(0, firstSpaceIndex).replace(/[^a-zA-Z]/g, "").toUpperCase();
                    definition = line.substring(firstSpaceIndex).trim();
                }

                if (word) {
                    scrabbleDictionary.set(word, definition || "Definition unavailable.");
                }
            }

            if (scrabbleDictionary.size > 0) {
                statusDiv.textContent = `Success! Loaded ${scrabbleDictionary.size.toLocaleString()} words offline.`;
                statusDiv.style.color = "#2e7d32";
                document.getElementById('uploadZone').classList.add('hidden');
                document.getElementById('checkerZone').classList.remove('hidden');
                document.getElementById('wordInput').focus();
            } else {
                statusDiv.textContent = "Error: Could not read data. Ensure words are listed first on each line.";
                statusDiv.style.color = "#c62828";
            }
        };

        reader.readAsText(file);
    });

    function checkWord() {
        const input = document.getElementById('wordInput').value.trim().toUpperCase();
        const resultDiv = document.getElementById('result');
        const defBox = document.getElementById('definitionBox');
        
        if (!input) {
            resultDiv.textContent = "Please enter a word.";
            resultDiv.className = "";
            defBox.style.display = "none";
            return;
        }

        if (scrabbleDictionary.has(input)) {
            const score = calculateScore(input);
            const savedDef = scrabbleDictionary.get(input);
            
            resultDiv.textContent = `✓ "${input}" is VALID! (${score} pts)`;
            resultDiv.className = "valid";
            
            defBox.innerHTML = `<div class="def-title">${input}</div><div>${savedDef}</div>`;
            defBox.style.display = "block";
        } else {
            resultDiv.textContent = `✗ "${input}" is NOT valid.`;
            resultDiv.className = "invalid";
            defBox.style.display = "none";
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            checkWord();
        }
    }
</script>


<div class="footer">
    <strong>Made by Gaurangaa Viknesh</strong><br>
    🇸🇬 Singapore<br>
    <span class="date">6 July 2026</span>
</div>

</body>
</html>
